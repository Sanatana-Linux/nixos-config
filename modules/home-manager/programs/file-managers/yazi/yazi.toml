[mgr]
layout = [2, 4, 3]
sort_by = "alphabetical"
sort_sensitive = true
sort_reverse = false
sort_dir_first = true
linemode = "mtime"
show_hidden = true
show_symlink = true

[preview]
tab_size = 3
max_width = 640
max_height = 860
cache_dir = ""

[opener]
folder = [
{ run = 'thunar "$@"', desc = "Reveal in Thunar" },
{ run = '$EDITOR "$@"' },
]
archive = [{ run = 'dtrx "$1"', desc = "Extract here" }]
text = [{ run = '$EDITOR "$@"', block = true }]
image = [
{ run = 'feh "$@"' },
{ run = 'imv "$@"' },
{ run = '''exiftool "$1"; echo "Press enter to exit"; read''', block = true, desc = "Show EXIF" },
]
svg = [
{ run = 'inkscape "$@"' },
{ run = 'loupe "$@"' },
]
video = [
{ run = 'vlc "$@"' },
{ run = '''mediainfo "$1"; echo "Press enter to exit"; read''', block = true, desc = "Show media info" },
]
audio = [
{ run = 'vlc "$@"' },
{ run = '''mediainfo "$1"; echo "Press enter to exit"; read''', block = true, desc = "Show media info" },
]

[open]
rules = [
   { mime = "inode/directory", use = "folder" },

   { url = "*.svg", use = "svg" },

{ mime = "text/*", use = "text" },
{ mime = "image/*", use = "image" },
{ mime = "video/*", use = "video" },
{ mime = "audio/*", use = "audio" },
{ mime = "inode/x-empty", use = "text" },

  { mime = "application/json", use = "text" },
  { mime = "*/javascript", use = "text" },

  { mime = "application/zip", use = "archive" },
  { mime = "application/gzip", use = "archive" },
  { mime = "application/x-tar", use = "archive" },
  { mime = "application/x-bzip", use = "archive" },
  { mime = "application/x-bzip2", use = "archive" },
  { mime = "application/x-7z-compressed", use = "archive" },
  { mime = "application/x-rar", use = "archive" },

  { mime = "*", use = "fallback" },
]

[tasks]
micro_workers = 5
macro_workers = 10
bizarre_retry = 5

[plugin]
# Previewers: custom file preview (replaces built-in preview)
previewers = [
  { url = "*.md", run = "glow" },
  { url = "*.zip", run = "ouch" },
  { url = "*.7z", run = "ouch" },
  { url = "*.rar", run = "ouch" },
  { url = "*.tar", run = "ouch" },
  { url = "*.tar.gz", run = "ouch" },
  { url = "*.tar.xz", run = "ouch" },
  { url = "*.tar.bz2", run = "ouch" },
  { url = "*.tar.zst", run = "ouch" },
]

# Git status fetcher — required by git.yazi plugin to show file change
# status as linemode in the file list.
prepend_fetchers = [
  { id = "git", url = "*",   run = "git", group = "git" },
  { id = "git", url = "*/",  run = "git", group = "git" },
]

[log]
enabled = false
